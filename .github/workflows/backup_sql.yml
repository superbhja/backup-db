name: Backup SQL v1.4

on:
  workflow_dispatch:
  schedule:
    - cron: "33 3 * * *"

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      TZ: America/Argentina/Buenos_Aires

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar PostgreSQL Client 17
        run: |
          sudo apt-get update
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")
          sudo sh -c "echo \"deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${CODENAME}-pgdg main\" > /etc/apt/sources.list.d/pgdg.list"
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Verificar versiones
        run: |
          psql --version
          pg_dump --version

      - name: Definir timestamp
        id: ts
        run: echo "stamp=$(date +'%Y-%m-%d_%H-%M')" >> "$GITHUB_OUTPUT"

      - name: Crear directorios de trabajo
        run: mkdir -p backups auditorias temp

      - name: Ejecutar pg_dump
        env:
          PGPASSWORD: ${{ secrets.DB_PASS }}
        run: |
          pg_dump \
            -h "${{ secrets.DB_HOST }}" \
            -p "${{ secrets.DB_PORT }}" \
            -U "${{ secrets.DB_USER }}" \
            -d "${{ secrets.DB_NAME }}" \
            -f "temp/dump_${{ steps.ts.outputs.stamp }}.sql"

      - name: Comprimir backup
        run: |
          zip -j \
            "backups/backup_hidroplanta_${{ steps.ts.outputs.stamp }}.zip" \
            "temp/dump_${{ steps.ts.outputs.stamp }}.sql"
          ls -lh "backups/backup_hidroplanta_${{ steps.ts.outputs.stamp }}.zip"

      - name: Auditar backup
        continue-on-error: true
        run: |
          python3 scripts/auditoria.py \
            "backups/backup_hidroplanta_${{ steps.ts.outputs.stamp }}.zip" \
            "auditorias/auditoria_hidroplanta_${{ steps.ts.outputs.stamp }}.md"

      - name: Commit y push de resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups auditorias
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "Backup automatico ${{ steps.ts.outputs.stamp }}"
            git push
          fi
