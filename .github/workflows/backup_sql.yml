name: Backup SQL v1.2

on:
workflow_dispatch:
push:

jobs:
backup:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Instalar PostgreSQL Client 17
    run: |
      sudo install -d /usr/share/postgresql-common/pgdg

      curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc > /dev/null

      echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list

      sudo apt-get update
      sudo apt-get install -y postgresql-client-17

  - name: Verificar versiones
    run: |
      psql --version
      pg_dump --version

  - name: Crear directorio temporal
    run: |
      mkdir -p temp

  - name: Ejecutar pg_dump
    env:
      PGPASSWORD: ${{ secrets.DB_PASS }}
    run: |
      pg_dump \
        -h "${{ secrets.DB_HOST }}" \
        -p "${{ secrets.DB_PORT }}" \
        -U "${{ secrets.DB_USER }}" \
        -d "${{ secrets.DB_NAME }}" \
        -f temp/backup.sql

  - name: Verificar archivo generado
    run: |
      ls -lh temp/backup.sql

  - name: Mostrar cantidad de lineas
    run: |
      wc -l temp/backup.sql

  - name: Mostrar primeras lineas
    run: |
      head -n 20 temp/backup.sql

  - name: Mostrar ultimas lineas
    run: |
      tail -n 20 temp/backup.sql